[tox]
env_list = cov, py311, py312, py313, py314
isolated_build = true
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=8
    pytest-asyncio
    httpx
    pico-boot
    prometheus-client
commands = pytest {posargs:tests}

[testenv:cov]
deps =
    {[testenv]deps}
    pytest-cov>=5
package = editable
setenv =
    COVERAGE_FILE = {tox_root}/.coverage
commands = pytest --cov=pico_actuator --cov-report=term-missing tests
