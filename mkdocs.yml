site_name: pico-actuator Documentation
site_description: "Spring Boot-style actuator for the Pico ecosystem: health and info endpoints over pico-fastapi."
site_url: https://dperezcabrera.github.io/pico-actuator/

repo_name: dperezcabrera/pico-actuator
repo_url: https://github.com/dperezcabrera/pico-actuator
edit_uri: edit/main/docs/
copyright: Copyright 2025-2026

strict: true

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/extra.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

hooks:
  - docs/hooks.py

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            docstring_style: google
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
      strict: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Learning Roadmap: LEARN.md
  - Example App: examples.md
  - User Guide:
    - user-guide/index.md
  - How-To Guides:
    - how-to/index.md
    - Kubernetes Probes: how-to/kubernetes-probes.md
    - Testing: how-to/testing.md
  - Cookbook (Patterns):
    - cookbook/README.md
    - Database Indicator: cookbook/pattern-database-indicator.md
    - Caching Checks: cookbook/pattern-cached-check.md
    - Securing Endpoints: cookbook/pattern-securing-endpoints.md
  - Architecture:
    - architecture.md
    - ADRs:
      - adr/README.md
      - ADR-001 Reuse Controllers: adr/adr-0001-reuse-pico-fastapi-controllers.md
      - ADR-002 Protocols over Registry: adr/adr-0002-protocols-over-registry.md
      - ADR-003 Failure Isolation: adr/adr-0003-failure-isolation.md
      - ADR-004 Dependency-Free Liveness: adr/adr-0004-dependency-free-liveness.md
      - ADR-005 Concurrent Checks: adr/adr-0005-concurrent-checks-with-timeout.md
  - Reference:
    - reference/index.md
    - Configuration: reference/config.md
  - AI Coding Skills: skills.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md
  - Changelog: CHANGELOG.md
